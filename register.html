<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="register.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />
  </head>
<body>
    <div class="card">
        <a href="login.html" class="back">Go back</a>
   <h2>REGISTER</h2>
    
    <form class="registerForm">
      <label for="username">Username</label>
      <input
        id="username"
        minlength="3"
        maxlength="20"
        type="text"
        name="username"
        placeholder="jere"
      />
      <label for="password">Password (min 8, Big letters and numbers)</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="jereJere1"
        pattern="^(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8,}$"
        minlength="8"
        required
      />
      <label for="email">Email (metropolia.fi)</label>
      <input
        id="email"
        type="email"
        name="email"
        placeholder="jeretur@metropolia.fi"
        pattern="^[^\s@]+@metropolia.fi$"
        title="Sähköpostin pitää päättyä @metropolia.fi"
        required
      />
      <input
        name="submit"
        type="submit"
        value="Register"
        class="postuser"
      />
    </form>
</div>
<div id="registerResponse"></div>   
    <script type="module" src="/register.js"></script>
  </div>
</body>
