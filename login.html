<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="forms.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="card">
      <h2>Log in</h2>
      <form class="loginForm">
        <label for="username">Username</label>
        <input type="text" name="username" placeholder="name" value="daisy" />
        <label for="password">Password</label>

        <input
          type="password"
          name="password"
          placeholder="name123"
          value="duck"
        />
        <div id="loginResponse"></div>
        <input name="submit" type="submit" value="Login" class="loginform" />
      </form>
      <br />
      <a href="resetpassword.html" id="ForgotPassword"
        ><b>Forgot password?</b></a
      >
      <p>Dont have an account?</p>
      <a href="register.html" id="CreateAccount"><b>CREATE ACCOUNT</b></a>
    </div>
  </body>

  <script type="module" src="/login.js"></script>
</html>
