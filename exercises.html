<!doctype html>
<html lang="en">
  <head>
    <script>
      const token = localStorage.getItem("token");

      if (!token) {
        // Ei kirjautunut → ohjataan login-sivulle
        window.location.href = "login.html";
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="exercise.css" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="On tärkeää että pidät huolta itsestäsi. Seuraa treeniohjeitamme, tarkastele terveyttäsi
      HRV tiedon avulla ja voi kokonaisvaltaisesti hyvin. Suuntaa nyt hyvinvointia ja uutta
      elämääsi kohti."
    />

    <title>Pulse</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;1,300&family=Roboto+Slab:wght@100;200;300;400;500;600;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!---------------->
    <!-- Navigation -->

    <nav>
      <ul>
        <li>
          <a href="index.html" id="logo"
            ><img
              src="/images/pulselogo.png"
              alt="Pulselogo"
              class="fl nav-inside"
          /></a>
        </li>

        <li>
          <!-- <a href="./bmi/" class="navlink">BMI laskuri</a> -->
          <a href="bmi.html" class="navlink">BMI</a>
        </li>
      </ul>
      <span class="header-links"></span>

      <div class="user-menu">
        <div class="user-name">Hei <span class="username"></span> ▾</div>

        <div class="dropdown">
          <a href="">Profile</a>
          <a href="">Exercises</a>
          <a href="#" id="logout">Log out</a>
        </div>
      </div>
    </nav>

    <div class="card">
      <form class="exerciseForm">

        <label for="Entrydate">Entry date</label>
        <input type="text" name="entrydate" placeholder="2026-02-04" value="" />

        <label for="Mood">Mood</label>
        <input type="text" name="mood" placeholder="Good" value="" />

        <label for="Weight">Weight</label>
        <input type="text" name="weight" placeholder="50-150" value="" />

        <label for="Sleep">Sleep</label>
        <input type="text" name="sleep_hours" placeholder="0-24" value="" />

        <label for="Notes">Notes</label>
        <input type="text" name="notes" placeholder="Optional" value="" />

        <input
          name="submit"
          type="submit"
          value="Continue"
          class="exerciseForm"
        />
      </form>

        <form class="nextForm" style="display: none;">
            <!--type duration intensity-->
        <label for="Type">Type</label>
        <input type="text" name="type" placeholder="chest day" value="" />

        <label for="Duration">Duration</label>
        <input type="text" name="duration" placeholder="50" value="" />

        <label for="Intensity">Intensity</label>
        <input type="text" name="intensity" placeholder="1-10" value="" />
        <input
          name="submit"
          type="submit"
          value="Submit"
          class="nextForm"
        />
        </form>
      <div id="exerciseResponse"></div>  
    </div>
  </body>
  <script type="module" src="exercise.js"></script>
  <script type="module" src="loggedUser.js"></script>
</html>
